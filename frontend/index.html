<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Easy PDF — Convertisseur de fichiers</title>
<meta name="description" content="Convertissez vos images et fichiers en PDF facilement. Projet étudiant open source.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
--bg: #0D0F14;
--surface: #13161E;
--raised: #1A1E29;
--border: rgba(255,255,255,0.07);
--border2: rgba(255,255,255,0.12);
--text: #F0F2F8;
--muted: #6B7280;
--subtle: #9CA3AF;

--accent: #FF6B35;
--accent2: #FF9A5C;
--accentbg: rgba(255,107,53,0.1);
--accentbd: rgba(255,107,53,0.25);

--green: #22C55E;
--greenbg: rgba(34,197,94,0.1);
--red: #EF4444;
--redbg: rgba(239,68,68,0.1);
--blue: #60A5FA;

--glow: 0 0 40px rgba(255,107,53,0.15);
--shadow: 0 4px 24px rgba(0,0,0,0.4);
--shadow-lg:0 12px 48px rgba(0,0,0,0.6);

--radius: 14px;
--radius-lg:20px;
--radius-xl:28px;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

body {
font-family: 'Instrument Sans', sans-serif;
background: var(--bg);
color: var(--text);
min-height: 100vh;
overflow-x: hidden;
}

h1,h2,h3,h4{font-family:'Cabinet Grotesk',sans-serif}

a{color:var(--accent);text-decoration:none}

nav {
display:flex;align-items:center;justify-content:space-between;
padding:16px 32px;
background:rgba(13,15,20,0.85);
border-bottom:1px solid var(--border);
}

.logo {display:flex;align-items:center;gap:10px;font-weight:800}

.hero {text-align:center;padding:60px 20px}

.drop-zone {
border:2px dashed var(--border2);
padding:40px;
border-radius:20px;
text-align:center;
cursor:pointer;
}

.file-list{margin-top:20px}

.btn{padding:10px 20px;border:none;border-radius:10px;cursor:pointer}
.btn-primary{background:var(--accent);color:white}

</style>
</head>
<body>

<nav>
<div class="logo">📄 EasyPDF</div>
</nav>

<section class="hero">
<h1>Vos fichiers en PDF</h1>
<p>Conversion locale, rapide et sécurisée</p>
</section>

<div class="drop-zone" onclick="document.getElementById('fileInput').click()">
<p>Déposez vos images ici</p>
</div>

<input type="file" id="fileInput" multiple accept="image/*">

<div class="file-list" id="fl1"></div>

<button class="btn btn-primary" onclick="startConvert()">Convertir</button>

<script>
let files = [];

document.getElementById('fileInput').addEventListener('change', e => {
files = Array.from(e.target.files);
document.getElementById('fl1').innerHTML = files.map(f => `<p>${f.name}</p>`).join('');
});

async function startConvert() {
for (const file of files) {
const reader = new FileReader();
reader.onload = function(e) {
const img = new Image();
img.onload = function() {
const { jsPDF } = window.jspdf;
const pdf = new jsPDF();
pdf.addImage(e.target.result, 'JPEG', 0, 0, 200, 200);
pdf.save(file.name + '.pdf');
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
}
}
</script>

</body>
</html>
